name: Build & Deploy

# Compiles the CV with Tectonic, builds the Astro site, and deploys it to
# GitHub Pages. Requires the repo's Pages "Source" to be set to "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deployment at a time; don't cancel an in-progress run, so a
# deploy always finishes rather than being interrupted by a newer push.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tectonic caches its downloaded package/format bundle under
      # ~/.cache/Tectonic. Key on the CV sources so a .tex change (which may
      # pull new packages) invalidates the cache; older caches still restore.
      - name: Cache Tectonic bundle
        uses: actions/cache@v4
        with:
          path: ~/.cache/Tectonic
          key: tectonic-${{ runner.os }}-${{ hashFiles('cv-src/**/*.tex') }}
          restore-keys: |
            tectonic-${{ runner.os }}-

      - name: Set up Tectonic
        uses: wtfjoke/setup-tectonic@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Compile the CV and place the PDF where Astro serves it, so the built
      # site's /cv/main.pdf link resolves.
      - name: Compile CV
        run: |
          mkdir -p public/cv
          tectonic --outdir public/cv cv-src/main.tex
          ls -la public/cv

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
